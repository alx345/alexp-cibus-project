apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-cibus
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/alx345/alexp-cibus-project.git
    targetRevision: HEAD
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
